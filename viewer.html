<!doctype html>
<html lang="sk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Session recorder</title>
<style>
  :root { --bg:#f6f6f4; --card:#fff; --ink:#1f1f1d; --muted:#6b6b66; --line:#e3e2dc; --accent:#1d6e56; }
  * { box-sizing: border-box; }
  body { margin:0; font:15px/1.5 system-ui, sans-serif; color:var(--ink); background:var(--bg); }
  header { padding:14px 20px; border-bottom:1px solid var(--line); background:var(--card); }
  header h1 { margin:0; font-size:16px; font-weight:600; }
  .wrap { display:grid; grid-template-columns:320px 1fr; height:calc(100vh - 51px); }
  .list { border-right:1px solid var(--line); overflow:auto; background:var(--card); }
  .item { padding:11px 16px; border-bottom:1px solid var(--line); cursor:pointer; }
  .item:hover { background:var(--bg); }
  .item.active { background:#e8f2ee; border-left:3px solid var(--accent); padding-left:13px; }
  .item .u { font-size:13px; color:var(--ink); word-break:break-all; }
  .item .m { font-size:12px; color:var(--muted); margin-top:3px; }
  .main { overflow:auto; padding:20px 20px 140px; display:flex; align-items:flex-start; justify-content:center; }
  .empty { color:var(--muted); margin-top:60px; }
  .pill { display:inline-block; background:var(--bg); border:1px solid var(--line); border-radius:20px; padding:1px 8px; font-size:11px; color:var(--muted); }
  .player { background:var(--card); border:1px solid var(--line); border-radius:6px; box-shadow:0 1px 3px rgba(0,0,0,.05); overflow:hidden; }
  .player .stage { position:relative; background:#fff; overflow:hidden; }
  .player .stage iframe { border:0; display:block; }
  .controls { display:flex; align-items:center; gap:12px; padding:10px 14px; border-top:1px solid var(--line); background:#fafaf8; }
  .controls button { padding:6px 14px; font-size:14px; border:1px solid var(--line); background:var(--card); border-radius:4px; cursor:pointer; }
  .controls button:hover { background:var(--bg); }
  .controls .time { font-variant-numeric: tabular-nums; font-size:13px; color:var(--muted); min-width:110px; }
  .controls .bar { flex:1; height:6px; background:var(--line); border-radius:3px; position:relative; cursor:pointer; }
  .controls .bar .fill { position:absolute; left:0; top:0; bottom:0; background:var(--accent); border-radius:3px; }
  .controls select { padding:4px 6px; font-size:13px; border:1px solid var(--line); border-radius:4px; background:var(--card); }
</style>
</head>
<body>
<header><h1>Session recorder — nahrávky</h1></header>
<div class="wrap">
  <div class="list" id="list"></div>
  <div class="main" id="main"><div class="empty">Vyber reláciu vľavo.</div></div>
</div>

<script type="module">
import { Replayer, unpack } from 'https://cdn.rrweb.com/all/current/all.js';

const listEl = document.getElementById('list');
const mainEl = document.getElementById('main');
let replayer = null;
let uiTimer = null;

function fmtDate(ms) { return new Date(ms).toLocaleString('sk-SK'); }
function fmtDur(ms) {
  const s = Math.round(ms / 1000);
  if (s < 60) return s + 's';
  const m = Math.floor(s / 60);
  return m + 'm ' + (s % 60) + 's';
}
function fmtTime(ms) {
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  return (m < 10 ? '0' : '') + m + ':' + ((s % 60) < 10 ? '0' : '') + (s % 60);
}

async function loadList() {
  const rows = await fetch('/api/sessions').then(r => r.json());
  if (!rows.length) { listEl.innerHTML = '<div class="empty" style="padding:16px">Zatiaľ žiadne relácie.</div>'; return; }
  listEl.innerHTML = '';
  rows.forEach(function (s) {
    const div = document.createElement('div');
    div.className = 'item';
    div.innerHTML =
      '<div class="u">' + (s.url || '(bez URL)') + '</div>' +
      '<div class="m">' + fmtDate(s.last_seen) + ' · <span class="pill">' + fmtDur(s.dur) + '</span> · ' +
      s.n + ' eventov · ' + s.site + '</div>';
    div.onclick = function () {
      document.querySelectorAll('.item').forEach(function (x) { x.classList.remove('active'); });
      div.classList.add('active');
      play(s.site, s.id);
    };
    listEl.appendChild(div);
  });
}

function showError(msg, detail) {
  mainEl.innerHTML = '<div class="empty" style="max-width:700px;text-align:left"><b>Chyba prehrávania</b><br>' + msg +
    (detail ? '<pre style="background:#fdd;padding:10px;overflow:auto;font-size:12px">' + String(detail).replace(/[<>]/g,'') + '</pre>' : '') + '</div>';
}

// Debug bar — vidno stav bez otvárania Console
const dbgBar = document.createElement('div');
dbgBar.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#222;color:#0f0;font:12px monospace;padding:6px 12px;z-index:9999;white-space:pre;overflow:auto;max-height:120px';
dbgBar.textContent = '[viewer] pripravený';
document.body.appendChild(dbgBar);
function dbg(msg) {
  const ts = new Date().toLocaleTimeString('sk-SK');
  dbgBar.textContent = '[' + ts + '] ' + msg + '\n' + dbgBar.textContent.slice(0, 800);
  console.log('[viewer]', msg);
}
window.addEventListener('error', function (e) { dbg('WINDOW ERROR: ' + (e.message || 'unknown')); });
window.addEventListener('unhandledrejection', function (e) { dbg('PROMISE REJECT: ' + (e.reason && (e.reason.message || e.reason.toString()))); });

dbg('modules: Replayer=' + typeof Replayer + ' unpack=' + typeof unpack);

function tearDown() {
  if (uiTimer) { clearInterval(uiTimer); uiTimer = null; }
  if (replayer) { try { replayer.pause(); replayer.destroy && replayer.destroy(); } catch (e) {} replayer = null; }
}

async function play(site, id) {
  tearDown();
  mainEl.innerHTML = '<div class="empty">Načítavam…</div>';

  let raw;
  try {
    raw = await fetch('/api/sessions/' + encodeURIComponent(site) + '/' + encodeURIComponent(id)).then(r => r.json());
  } catch (e) { showError('fetch zlyhal', e.message); return; }

  const events = [];
  const unpackErrors = [];
  const typeCounts = {};
  for (let i = 0; i < raw.events.length; i++) {
    try {
      const ev = unpack(raw.events[i]);
      events.push(ev);
      typeCounts[ev.type] = (typeCounts[ev.type] || 0) + 1;
    } catch (e) {
      unpackErrors.push({ i, msg: e.message });
    }
  }
  dbg('session ' + id.slice(0, 12) + '… raw=' + raw.events.length + ' ok=' + events.length + ' types=' + JSON.stringify(typeCounts));

  if (events.length < 2) { showError('Relácia je príliš krátka (' + events.length + ' použiteľných eventov).', JSON.stringify(typeCounts)); return; }
  if (!typeCounts[2]) { showError('Chýba FullSnapshot event (type=2). Player nemá odkiaľ začať.', JSON.stringify(typeCounts)); return; }

  // Zostav player kontajner + stage + controls
  mainEl.innerHTML = '';
  const player = document.createElement('div');
  player.className = 'player';
  player.style.width = Math.min(1000, mainEl.clientWidth - 40) + 'px';

  const stage = document.createElement('div');
  stage.className = 'stage';
  stage.style.width = Math.min(1000, mainEl.clientWidth - 40) + 'px';
  stage.style.height = '540px';
  player.appendChild(stage);

  const controls = document.createElement('div');
  controls.className = 'controls';
  controls.innerHTML =
    '<button id="pp">▶ Play</button>' +
    '<span class="time" id="tm">00:00 / 00:00</span>' +
    '<div class="bar" id="bar"><div class="fill" id="fill"></div></div>' +
    '<select id="speed"><option value="0.5">0.5×</option><option value="1" selected>1×</option><option value="2">2×</option><option value="4">4×</option><option value="8">8×</option></select>';
  player.appendChild(controls);
  mainEl.appendChild(player);

  // Zisti viewport z prvého Meta eventu (type 4)
  let vpW = 1280, vpH = 720;
  for (const ev of events) {
    if (ev.type === 4 && ev.data && ev.data.width) {
      vpW = ev.data.width;
      vpH = ev.data.height;
      break;
    }
  }
  dbg('viewport: ' + vpW + 'x' + vpH);

  try {
    dbg('creating Replayer, events=' + events.length);
    replayer = new Replayer(events, {
      root: stage,
      skipInactive: true,
      showWarning: false,
      showDebug: false
    });
    dbg('Replayer created, stage children=' + stage.children.length);
  } catch (e) {
    dbg('REPLAYER THREW: ' + (e.message || e));
    showError('rrweb Replayer padol pri inicializácii.', e.stack || e.message);
    return;
  }

  // Dopočítaj scale a nastav rozmery stage podľa reálneho viewportu
  const stageW = Math.min(1000, mainEl.clientWidth - 40);
  const scale = Math.min(stageW / vpW, 540 / vpH);
  const scaledH = Math.round(vpH * scale);
  stage.style.width = stageW + 'px';
  stage.style.height = scaledH + 'px';
  // rrweb vloží .replayer-wrapper do stage; naň dáme transform
  const wrapper = stage.querySelector('.replayer-wrapper');
  if (wrapper) {
    wrapper.style.transformOrigin = 'top left';
    wrapper.style.transform = 'scale(' + scale + ')';
    dbg('applied scale=' + scale.toFixed(3) + ' stage=' + stageW + 'x' + scaledH);
  } else {
    dbg('WARN: .replayer-wrapper not found — scale not applied');
  }

  // Meta + UI wiring
  const meta = replayer.getMetaData();
  const totalMs = meta.totalTime;
  dbg('meta totalMs=' + totalMs + ' startTs=' + meta.startTime + ' endTs=' + meta.endTime);

  const ppBtn = controls.querySelector('#pp');
  const tmEl = controls.querySelector('#tm');
  const barEl = controls.querySelector('#bar');
  const fillEl = controls.querySelector('#fill');
  const speedEl = controls.querySelector('#speed');

  let playing = false;
  let currentMs = 0;

  function updateUi() {
    tmEl.textContent = fmtTime(currentMs) + ' / ' + fmtTime(totalMs);
    fillEl.style.width = (Math.min(1, currentMs / totalMs) * 100) + '%';
  }
  updateUi();

  function startTick() {
    if (uiTimer) clearInterval(uiTimer);
    uiTimer = setInterval(function () {
      if (!replayer || !playing) return;
      currentMs = replayer.getCurrentTime();
      updateUi();
      if (currentMs >= totalMs) { playing = false; ppBtn.textContent = '▶ Play'; }
    }, 100);
  }

  ppBtn.onclick = function () {
    if (!replayer) return;
    if (playing) {
      replayer.pause();
      playing = false;
      ppBtn.textContent = '▶ Play';
    } else {
      // ak sme na konci, reštartuj od 0
      if (currentMs >= totalMs - 100) { currentMs = 0; }
      replayer.play(currentMs);
      playing = true;
      ppBtn.textContent = '⏸ Pause';
      startTick();
    }
  };

  barEl.onclick = function (e) {
    const rect = barEl.getBoundingClientRect();
    const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    currentMs = pct * totalMs;
    if (playing) replayer.play(currentMs); else replayer.pause(currentMs);
    updateUi();
  };

  speedEl.onchange = function () {
    if (replayer) replayer.setConfig({ speed: parseFloat(speedEl.value) });
  };
}

loadList();
</script>
</body>
</html>
