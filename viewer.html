<!doctype html>
<html lang="sk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Session recorder</title>
<style>
  :root { --bg:#f6f6f4; --card:#fff; --ink:#1f1f1d; --muted:#6b6b66; --line:#e3e2dc; --accent:#1d6e56; }
  * { box-sizing: border-box; }
  body { margin:0; font:15px/1.5 system-ui, sans-serif; color:var(--ink); background:var(--bg); }
  header { padding:14px 20px; border-bottom:1px solid var(--line); background:var(--card); display:flex; align-items:center; justify-content:space-between; }
  header h1 { margin:0; font-size:16px; font-weight:600; }
  .lang-toggle { display:flex; gap:4px; font-size:12px; }
  .lang-toggle button { padding:2px 8px; border:1px solid var(--line); background:var(--card); color:var(--muted); border-radius:3px; cursor:pointer; font-size:11px; text-transform:uppercase; }
  .lang-toggle button.active { background:var(--accent); color:#fff; border-color:var(--accent); }
  .wrap { display:grid; grid-template-columns:320px 1fr; height:calc(100vh - 51px); }
  .list { border-right:1px solid var(--line); overflow:auto; background:var(--card); display:flex; flex-direction:column; }

  /* Filter bar — sticky nad zoznamom */
  .filters { position:sticky; top:0; background:var(--card); border-bottom:1px solid var(--line); padding:8px 12px; display:flex; flex-direction:column; gap:6px; z-index:2; }
  .filters .row { display:flex; gap:6px; align-items:center; }
  .filters select, .filters input[type="text"] { flex:1; min-width:0; padding:4px 6px; font-size:12px; border:1px solid var(--line); border-radius:3px; background:var(--card); }
  .filters label.chk { display:flex; align-items:center; gap:4px; font-size:12px; color:var(--muted); cursor:pointer; white-space:nowrap; }
  .filters label.chk input { margin:0; }
  .filters .count { font-size:11px; color:var(--muted); text-align:right; }

  .list-items { overflow:auto; flex:1; }
  .item { padding:11px 16px; border-bottom:1px solid var(--line); cursor:pointer; position:relative; }
  .item:hover { background:var(--bg); }
  .item.active { background:#e8f2ee; border-left:3px solid var(--accent); padding-left:13px; }
  .item .u { font-size:13px; color:var(--ink); word-break:break-all; padding-right:26px; }
  .item .m { font-size:12px; color:var(--muted); margin-top:3px; padding-right:26px; }
  .item .site-dot { display:inline-block; width:7px; height:7px; border-radius:50%; margin-right:5px; vertical-align:middle; }

  /* Label dropdown — natívny <select> v pravom hornom rohu */
  .label-select { position:absolute; top:6px; right:8px; font-size:11px; padding:2px 4px; border:1px solid var(--line); border-radius:3px; background:var(--card); cursor:pointer; max-width:110px; }
  .label-select.interesting { background:#fff8dd; border-color:#e6b800; color:#8a5b1e; }
  .label-select.reviewed    { background:#e8f5e9; border-color:#4caf50; color:#2e7031; }
  .label-select.issue       { background:#fbdcdc; border-color:#e53935; color:#8a1e1e; }
  .label-select.test        { background:#f0f0f0; border-color:#9e9e9e; color:#616161; }

  /* Delete button v detail paneli */
  .detail .delete-btn { display:inline-block; margin-top:10px; padding:5px 10px; font-size:12px; background:#fbdcdc; border:1px solid #e6a3a3; color:#8a1e1e; border-radius:3px; cursor:pointer; }
  .detail .delete-btn:hover { background:#f5c8c8; }

  /* Rozbalená karta s metadátami session — visible len keď .item.active */
  .item .detail { display:none; margin-top:10px; padding-top:10px; border-top:1px dashed var(--line); font-size:12px; color:var(--ink); }
  .item.active .detail { display:block; }
  .detail .row { display:flex; justify-content:space-between; gap:8px; padding:2px 0; }
  .detail .row .k { color:var(--muted); flex:0 0 auto; }
  .detail .row .v { text-align:right; word-break:break-all; }
  .detail .badge { display:inline-block; background:var(--bg); border:1px solid var(--line); padding:0 6px; border-radius:3px; font-size:11px; }
  .detail .badge.ok { background:#e8f2ee; border-color:#b6d9c9; color:#1d6e56; }
  .detail .badge.warn { background:#fbeee1; border-color:#e6c9a3; color:#8a5b1e; }
  .detail .badge.err { background:#fbdcdc; border-color:#e6a3a3; color:#8a1e1e; }
  .detail h4 { margin:10px 0 4px; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.05em; color:var(--muted); }
  .detail .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:2px 12px; }
  .detail .url-list { max-height:60px; overflow:auto; padding-left:12px; margin:2px 0; font-size:11px; line-height:1.4; }
  .detail .copy { cursor:pointer; color:var(--accent); text-decoration:underline; font-size:11px; }
  .detail details { margin-top:6px; font-size:11px; }
  .detail details summary { cursor:pointer; color:var(--muted); }
  .detail details pre { background:var(--bg); padding:6px; border-radius:3px; white-space:pre-wrap; word-break:break-all; margin:4px 0 0; font-size:10px; max-height:100px; overflow:auto; }
  .main { padding:16px; display:flex; align-items:center; justify-content:center; overflow:hidden; }
  .empty { color:var(--muted); margin-top:60px; }
  .pill { display:inline-block; background:var(--bg); border:1px solid var(--line); border-radius:20px; padding:1px 8px; font-size:11px; color:var(--muted); }
  .player { background:var(--card); border:1px solid var(--line); border-radius:6px; box-shadow:0 1px 3px rgba(0,0,0,.05); overflow:hidden; }
  .player .stage { position:relative; background:#fff; overflow:hidden; }
  .player .stage iframe { border:0; display:block; }
  .controls { display:flex; align-items:center; gap:12px; padding:10px 14px; border-top:1px solid var(--line); background:#fafaf8; }
  .controls button { padding:6px 14px; font-size:14px; border:1px solid var(--line); background:var(--card); border-radius:4px; cursor:pointer; }
  .controls button:hover { background:var(--bg); }
  .controls .time { font-variant-numeric: tabular-nums; font-size:13px; color:var(--muted); min-width:110px; }
  .controls .bar { flex:1; height:10px; background:var(--line); border-radius:5px; position:relative; cursor:pointer; }
  .controls .bar .fill { position:absolute; left:0; top:0; bottom:0; background:var(--accent); border-radius:5px; opacity:0.35; pointer-events:none; }
  .controls .bar .marker { position:absolute; top:-2px; bottom:-2px; width:2px; opacity:0.75; cursor:pointer; border-radius:1px; }
  .controls .bar .marker:hover { opacity:1; width:3px; top:-3px; bottom:-3px; }
  .controls .bar .marker.click { background:#1d6e56; }
  .controls .bar .marker.input { background:#c67c1f; }
  .controls .bar .marker.nav   { background:#7c4ea1; }
  .controls .toggle { display:flex; align-items:center; gap:4px; font-size:12px; color:var(--muted); cursor:pointer; user-select:none; }
  .controls .toggle input { margin:0; }
  .controls select { padding:4px 6px; font-size:13px; border:1px solid var(--line); border-radius:4px; background:var(--card); }

  /* rrweb Replayer overlay CSS (mouse cursor + trace).
     Bez position:absolute na mouse-tail sa canvas skladá v block-flow nad iframe
     a wrapper má dvojnásobnú výšku — obsah končí pod stage. */
  .replayer-mouse-tail { position: absolute; top:0; left:0; pointer-events: none; }
  .replayer-mouse {
    position: absolute; width:20px; height:20px;
    transition: left 0.05s linear, top 0.05s linear;
    background-size: contain; background-position: center center; background-repeat: no-repeat;
    background-image: url('data:image/svg+xml;base64,PHN2ZyBoZWlnaHQ9JzMwMHB4JyB3aWR0aD0nMzAwcHgnICBmaWxsPSIjMDAwMDAwIiB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIGRhdGEtbmFtZT0iTGF5ZXIgMSIgdmlld0JveD0iMCAwIDUwIDUwIiB4PSIwcHgiIHk9IjBweCI+PHRpdGxlPkRlc2lnbl90bnA8L3RpdGxlPjxwYXRoIGQ9Ik00OC43MSw0Mi45MUwzNC4wOCwyOC4yOSw0NC4zMywxOEExLDEsMCwwLDAsNDQsMTYuMzlMMi4zNSwxLjA2QTEsMSwwLDAsMCwxLjA2LDIuMzVMMTYuMzksNDRhMSwxLDAsMCwwLDEuNjUuMzZMMjguMjksMzQuMDgsNDIuOTEsNDguNzFhMSwxLDAsMCwwLDEuNDEsMGw0LjM4LTQuMzhBMSwxLDAsMCwwLDQ4LjcxLDQyLjkxWm0tNS4wOSwzLjY3TDI5LDMyYTEsMSwwLDAsMC0xLjQxLDBsLTkuODUsOS44NUwzLjY5LDMuNjlsMzguMTIsMTRMMzIsMjcuNThBMSwxLDAsMCwwLDMyLDI5TDQ2LjU5LDQzLjYyWiI+PC9wYXRoPjwvc3ZnPg==');
  }
  .replayer-mouse::after { content:''; display:inline-block; width:20px; height:20px; background: rgb(73, 80, 246); border-radius:100%; transform: translate(-50%, -50%); opacity:0.3; }
</style>
</head>
<body>
<header>
  <h1 data-i18n="header"></h1>
  <div class="lang-toggle" id="lang-toggle">
    <button data-lang="sk">SK</button>
    <button data-lang="en">EN</button>
  </div>
</header>
<div class="wrap">
  <div class="list">
    <div class="filters" id="filters">
      <div class="row">
        <select id="f-site" data-i18n-title="filterSite"><option value="" data-i18n="allSites"></option></select>
        <select id="f-label" data-i18n-title="filterLabel">
          <option value="" data-i18n="allLabels"></option>
          <option value="__none__" data-i18n="noLabel"></option>
          <option value="interesting">interesting</option>
          <option value="reviewed">reviewed</option>
          <option value="issue">issue</option>
          <option value="test">test</option>
        </select>
      </div>
      <div class="row">
        <input type="text" id="f-search" data-i18n-placeholder="searchPlaceholder">
        <label class="chk" data-i18n-title="onlyPlayableTitle"><input type="checkbox" id="f-playable"><span data-i18n="onlyPlayable"></span></label>
      </div>
      <div class="count" id="f-count"></div>
    </div>
    <div class="list-items" id="list"></div>
  </div>
  <div class="main" id="main"><div class="empty" data-i18n="pickSession"></div></div>
</div>

<script type="module">
import { Replayer, unpack } from 'https://cdn.rrweb.com/all/current/all.js';

// ===== i18n =====
const DICT = {
  sk: {

    device: 'Zariadenie', os: 'OS', browser: 'Browser', viewport: 'Viewport',
    country: 'Krajina', language: 'Jazyk',
    path: 'Cesta', referrer: 'Referrer', entry: 'Entry', exit: 'Exit',
    pages: 'Stránok', showAllPages: 'Zobraz všetky stránky', direct: '(direct)',
    activity: 'Aktivita', clicks: 'Kliky', scrolls: 'Scrolly', inputs: 'Inputy', domChanges: 'DOM zmien',

    searchPlaceholder: 'Hľadať v URL…',

    setLabel: 'nastaviť label', removeLabel: 'odstrániť label',
    labelUpdateFailed: 'Uloženie labelu zlyhalo: ', deleteFailed: 'Zmazanie zlyhalo: ',
    visibleCount: '{v} / {t} viditeľných'
  },
  en: {
    header: 'Session recorder — recordings',
    pickSession: 'Pick a session on the left.',
    noSessions: 'No sessions yet.',
    loadingMeta: 'Loading metadata…',
    metaFetchFailed: 'Metadata fetch failed: ',
    loading: 'Loading…',
    fetchFailed: 'Fetch failed',
    sessionTooShort: 'Session too short ({n} usable events).',
    missingFullSnapshot: 'Missing FullSnapshot event (type=2). Player has no baseline.',
    playbackError: 'Playback error',
    replayerCrash: 'rrweb Replayer crashed on init.',
    device: 'Device', os: 'OS', browser: 'Browser', viewport: 'Viewport',
    country: 'Country', language: 'Language',
    path: 'Path', referrer: 'Referrer', entry: 'Entry', exit: 'Exit',
    pages: 'Pages', showAllPages: 'Show all pages', direct: '(direct)',
    activity: 'Activity', clicks: 'Clicks', scrolls: 'Scrolls', inputs: 'Inputs', domChanges: 'DOM changes',
    time: 'Time', actualDuration: 'Actual duration', activeTime: 'Active time',
    serverDuration: 'Server duration', events: 'Events',
    meta: 'Meta', playable: 'Playable', sessionId: 'Session ID', uaRaw: 'UA raw',
    deleteRecording: 'Delete recording', deleteTitle: 'Delete this session from DB',
    play: 'Play', pause: 'Pause',
    skipIdle: 'skip idle', skipIdleTitle: 'Skip inactive periods (>5s idle)',
    speedTitle: 'Playback speed',
    markerClick: 'Click / touch', markerInput: 'Input focus/change', markerNav: 'Navigation → ',
    copied: 'copied', copyFullId: 'Copy full ID',
    badgePlayable: '✓ playable', badgeNoSnapshot: '✗ no snapshot',
    confirmDelete: 'Really delete this recording? Cannot be undone.',
    allSites: 'All sites', filterSite: 'Filter by site',
    allLabels: 'All labels', noLabel: 'No label', filterLabel: 'Filter by label',
    searchPlaceholder: 'Search URL…',
    onlyPlayable: 'playable only', onlyPlayableTitle: 'Hide sessions without FullSnapshot',
    setLabel: 'set label', removeLabel: 'remove label',
    labelUpdateFailed: 'Label update failed: ', deleteFailed: 'Delete failed: ',
    visibleCount: '{v} / {t} visible'
  }
};
// localStorage prepíše auto-detekciu; auto = 'sk' iff navigator.language starts with sk
const LANG = (function () {
  const stored = localStorage.getItem('rec_lang');
  if (stored === 'sk' || stored === 'en') return stored;
  const nav = String(navigator.language || '').toLowerCase();
  return nav.startsWith('sk') ? 'sk' : 'en';
})();
function t(k, vars) {
  let s = (DICT[LANG] && DICT[LANG][k]) || DICT.en[k] || k;
  if (vars) for (const key in vars) s = s.replace('{' + key + '}', vars[key]);
  return s;
}
function setLang(l) { localStorage.setItem('rec_lang', l); location.reload(); }
// Apply data-i18n attrs na statickom HTML
document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.dataset.i18n); });
document.querySelectorAll('[data-i18n-placeholder]').forEach(el => { el.placeholder = t(el.dataset.i18nPlaceholder); });
document.querySelectorAll('[data-i18n-title]').forEach(el => { el.title = t(el.dataset.i18nTitle); });
document.querySelectorAll('#lang-toggle button').forEach(el => {
  if (el.dataset.lang === LANG) el.classList.add('active');
  el.addEventListener('click', () => setLang(el.dataset.lang));
});
document.documentElement.lang = LANG;
document.title = t('header');

const listEl = document.getElementById('list');
const mainEl = document.getElementById('main');
let replayer = null;
let uiTimer = null;

function fmtDate(ms) { return new Date(ms).toLocaleString(LANG === 'sk' ? 'sk-SK' : 'en-GB'); }
function fmtDur(ms) {
  if (ms == null) return '—';
  const s = Math.round(ms / 1000);
  if (s < 60) return s + 's';
  const m = Math.floor(s / 60);
  return m + 'm ' + (s % 60) + 's';
}
function fmtTime(ms) {
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  return (m < 10 ? '0' : '') + m + ':' + ((s % 60) < 10 ? '0' : '') + (s % 60);
}
function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// Minimalistický UA parser — bez závislostí, len na najbežnejšie kombinácie
function parseUA(ua) {
  if (!ua) return { browser: '—', os: '—', device: '—' };
  const u = ua;
  let browser = 'Other';
  if (/Edg\//.test(u)) browser = 'Edge ' + (u.match(/Edg\/(\d+)/) || [])[1] || 'Edge';
  else if (/Chrome\//.test(u) && !/Chromium/.test(u)) browser = 'Chrome ' + ((u.match(/Chrome\/(\d+)/) || [])[1] || '');
  else if (/Firefox\//.test(u)) browser = 'Firefox ' + ((u.match(/Firefox\/(\d+)/) || [])[1] || '');
  else if (/Safari\//.test(u) && /Version\//.test(u)) browser = 'Safari ' + ((u.match(/Version\/(\d+)/) || [])[1] || '');
  let os = 'Other';
  if (/Windows NT/.test(u)) os = 'Windows';
  else if (/Mac OS X/.test(u) && !/Mobile/.test(u)) os = 'macOS';
  else if (/Android/.test(u)) os = 'Android';
  else if (/iPhone|iPad|iPod/.test(u)) os = 'iOS';
  else if (/Linux/.test(u)) os = 'Linux';
  let device = 'Desktop';
  if (/iPad|Tablet/.test(u)) device = 'Tablet';
  else if (/iPhone|Android.*Mobile|Mobi/.test(u)) device = 'Mobile';
  return { browser: browser.trim(), os, device };
}
function shortUrl(u, max) {
  if (!u) return '—';
  try { const url = new URL(u); const p = url.pathname + url.search; return p.length > max ? p.slice(0, max) + '…' : (p || '/'); }
  catch (e) { return u.length > max ? u.slice(0, max) + '…' : u; }
}
async function copyToClipboard(text) {
  try { await navigator.clipboard.writeText(text); } catch (e) { console.warn('copy failed', e); }
}

function renderDetail(s, summary) {
  const meta = summary.meta;
  const sum = summary.summary;
  const ua = parseUA(meta.ua);
  const vp = sum.viewport ? sum.viewport.w + '×' + sum.viewport.h : '—';
  const activity = sum.activity || {};
  const playable = sum.playable ? '<span class="badge ok">' + t('badgePlayable') + '</span>' : '<span class="badge err">' + t('badgeNoSnapshot') + '</span>';
  const entryPath = shortUrl(sum.entryUrl, 50);
  const exitPath = shortUrl(sum.exitUrl, 50);
  const pageList = (sum.pages || []).map(p => '<div>' + esc(shortUrl(p, 60)) + '</div>').join('') || '<div class="k">—</div>';
  return `
    <div class="detail">
      <div class="grid2">
        <div class="row"><span class="k">${t('device')}</span><span class="v">${esc(ua.device)}</span></div>
        <div class="row"><span class="k">${t('os')}</span><span class="v">${esc(ua.os)}</span></div>
        <div class="row"><span class="k">${t('browser')}</span><span class="v">${esc(ua.browser)}</span></div>
        <div class="row"><span class="k">${t('viewport')}</span><span class="v">${esc(vp)}</span></div>
        <div class="row"><span class="k">${t('country')}</span><span class="v">${meta.country ? esc(meta.country) : '—'}</span></div>
        <div class="row"><span class="k">${t('language')}</span><span class="v">${meta.language ? esc(meta.language) : '—'}</span></div>
      </div>

      <h4>${t('path')}</h4>
      <div class="row"><span class="k">${t('referrer')}</span><span class="v">${meta.referrer ? esc(shortUrl(meta.referrer, 40)) : t('direct')}</span></div>
      <div class="row"><span class="k">${t('entry')}</span><span class="v">${esc(entryPath)}</span></div>
      <div class="row"><span class="k">${t('exit')}</span><span class="v">${esc(exitPath)}</span></div>
      <div class="row"><span class="k">${t('pages')}</span><span class="v">${sum.pagesCount}</span></div>
      <details><summary>${t('showAllPages')}</summary><div class="url-list">${pageList}</div></details>

      <h4>${t('activity')}</h4>
      <div class="grid2">
        <div class="row"><span class="k">${t('clicks')}</span><span class="v">${activity.interactions || 0}</span></div>
        <div class="row"><span class="k">${t('scrolls')}</span><span class="v">${activity.scrolls || 0}</span></div>
        <div class="row"><span class="k">${t('inputs')}</span><span class="v">${activity.inputs || 0}</span></div>
        <div class="row"><span class="k">${t('domChanges')}</span><span class="v">${activity.mutations || 0}</span></div>
      </div>

      <h4>${t('time')}</h4>
      <div class="grid2">
        <div class="row"><span class="k">${t('actualDuration')}</span><span class="v">${fmtDur(sum.actualDurationMs)}</span></div>
        <div class="row"><span class="k">${t('activeTime')}</span><span class="v">${fmtDur(sum.activeMs)}</span></div>
        <div class="row"><span class="k">${t('serverDuration')}</span><span class="v">${fmtDur(meta.dur || (meta.last_seen - meta.first_seen))}</span></div>
        <div class="row"><span class="k">${t('events')}</span><span class="v">${sum.eventCount}</span></div>
      </div>

      <h4>${t('meta')}</h4>
      <div class="row"><span class="k">${t('playable')}</span><span class="v">${playable}</span></div>
      <div class="row"><span class="k">${t('sessionId')}</span><span class="v"><span class="copy" data-sid="${esc(meta.id)}" title="${t('copyFullId')}">${esc(meta.id.slice(0, 12))}…</span></span></div>
      <details><summary>${t('uaRaw')}</summary><pre>${esc(meta.ua)}</pre></details>
      <button class="delete-btn" data-delete title="${t('deleteTitle')}">${t('deleteRecording')}</button>
    </div>`;
}

const summaryCache = new Map();
const LABELS = ['interesting', 'reviewed', 'issue', 'test'];

// Deterministic hue z siteKey pre farebný badge
function siteHue(key) {
  let h = 0;
  for (let i = 0; i < key.length; i++) h = (((h << 5) - h) + key.charCodeAt(i)) | 0;
  return Math.abs(h) % 360;
}
function siteDotStyle(key) { return 'background: hsl(' + siteHue(key) + ', 60%, 55%)'; }

// URL hash state — bookmarkovatelný filter
function parseHash() {
  const p = new URLSearchParams(location.hash.replace(/^#/, ''));
  return { site: p.get('site') || '', label: p.get('label') || '', playable: p.get('playable') === '1', q: p.get('q') || '' };
}
function writeHash(st) {
  const parts = [];
  if (st.site) parts.push('site=' + encodeURIComponent(st.site));
  if (st.label) parts.push('label=' + encodeURIComponent(st.label));
  if (st.playable) parts.push('playable=1');
  if (st.q) parts.push('q=' + encodeURIComponent(st.q));
  history.replaceState(null, '', parts.length ? '#' + parts.join('&') : location.pathname);
}
function getFilterState() {
  return {
    site: document.getElementById('f-site').value,
    label: document.getElementById('f-label').value,
    playable: document.getElementById('f-playable').checked,
    q: document.getElementById('f-search').value.trim().toLowerCase()
  };
}
function applyFilters() {
  const st = getFilterState();
  writeHash(st);
  const items = listEl.querySelectorAll('.item');
  let visible = 0;
  items.forEach(function (el) {
    const site = el.dataset.site;
    const label = el.dataset.label || '';
    const playable = el.dataset.hasSnapshot === '1';
    const url = (el.dataset.url || '').toLowerCase();
    let show = true;
    if (st.site && site !== st.site) show = false;
    if (st.label === '__none__' && label) show = false;
    else if (st.label && st.label !== '__none__' && label !== st.label) show = false;
    if (st.playable && !playable) show = false;
    if (st.q && !url.includes(st.q)) show = false;
    el.style.display = show ? '' : 'none';
    if (show) visible++;
  });
  document.getElementById('f-count').textContent = items.length ? t('visibleCount', { v: visible, t: items.length }) : '';
}

async function loadSummary(site, id) {
  const key = site + '/' + id;
  if (summaryCache.has(key)) return summaryCache.get(key);
  const p = fetch('/api/sessions/' + encodeURIComponent(site) + '/' + encodeURIComponent(id) + '/summary')
    .then(r => r.ok ? r.json() : Promise.reject('HTTP ' + r.status));
  summaryCache.set(key, p);
  return p;
}
async function patchLabel(site, id, label) {
  const r = await fetch('/api/sessions/' + encodeURIComponent(site) + '/' + encodeURIComponent(id), {
    method: 'PATCH', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ label: label || null })
  });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}
async function deleteSession(site, id) {
  const r = await fetch('/api/sessions/' + encodeURIComponent(site) + '/' + encodeURIComponent(id), { method: 'DELETE' });
  if (!r.ok && r.status !== 404) throw new Error('HTTP ' + r.status);
}

function renderItem(s) {
  const label = s.label || '';
  const selClass = 'label-select' + (label ? ' ' + label : '');
  const opts = '<option value="">—</option>' +
    LABELS.map(function (l) { return '<option value="' + l + '"' + (label === l ? ' selected' : '') + '>' + l + '</option>'; }).join('');

  const div = document.createElement('div');
  div.className = 'item';
  div.dataset.site = s.site;
  div.dataset.id = s.id;
  div.dataset.label = label;
  div.dataset.hasSnapshot = s.has_snapshot ? '1' : '0';
  div.dataset.url = s.url || '';
  div.innerHTML =
    '<select class="' + selClass + '" data-label-select title="' + t('setLabel') + '">' + opts + '</select>' +
    '<div class="u">' + esc(s.url || '(bez URL)') + '</div>' +
    '<div class="m">' +
      '<span class="site-dot" style="' + siteDotStyle(s.site) + '"></span>' +
      fmtDate(s.last_seen) + ' · <span class="pill">' + fmtDur(s.dur) + '</span> · ' +
      s.n + ' eventov · ' + esc(s.site) +
    '</div>' +
    '<div class="detail-slot"></div>';
  return div;
}

async function loadList() {
  const rows = await fetch('/api/sessions').then(r => r.json());
  listEl.innerHTML = '';
  if (!rows.length) { listEl.innerHTML = '<div class="empty" style="padding:16px">' + t('noSessions') + '</div>'; return; }

  // Populate site dropdown z unique sites; skry ak je len 1
  const sites = Array.from(new Set(rows.map(function (r) { return r.site; }))).sort();
  const siteEl = document.getElementById('f-site');
  siteEl.innerHTML = '<option value="">' + t('allSites') + '</option>' +
    sites.map(function (s) { return '<option value="' + esc(s) + '">' + esc(s) + '</option>'; }).join('');
  siteEl.style.display = sites.length <= 1 ? 'none' : '';

  rows.forEach(function (s) {
    const div = renderItem(s);
    div.onclick = async function (e) {
      // Neexpandovať pri kliku na interactive elementy (select, delete, copy)
      if (e && e.target && e.target.closest && e.target.closest('[data-label-select], [data-delete], .copy, .delete-btn')) return;
      document.querySelectorAll('.item').forEach(function (x) { x.classList.remove('active'); });
      div.classList.add('active');
      const slot = div.querySelector('.detail-slot');
      slot.innerHTML = '<div class="detail" style="color:var(--muted)">' + t('loadingMeta') + '</div>';
      loadSummary(s.site, s.id).then(function (summary) {
        slot.innerHTML = renderDetail(s, summary);
      }).catch(function (e2) {
        slot.innerHTML = '<div class="detail" style="color:#8a1e1e">' + t('metaFetchFailed') + esc(e2) + '</div>';
      });
      play(s.site, s.id);
    };
    listEl.appendChild(div);
  });

  // Restore filter state z URL hashu
  const st = parseHash();
  document.getElementById('f-site').value = st.site;
  document.getElementById('f-label').value = st.label;
  document.getElementById('f-playable').checked = st.playable;
  document.getElementById('f-search').value = st.q;
  applyFilters();
}

// Filter change handlers
document.getElementById('f-site').addEventListener('change', applyFilters);
document.getElementById('f-label').addEventListener('change', applyFilters);
document.getElementById('f-playable').addEventListener('change', applyFilters);
let searchTimer = null;
document.getElementById('f-search').addEventListener('input', function () {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(applyFilters, 200);
});

// Delegated click: copy + delete. Label je change event nižšie.
listEl.addEventListener('click', function (e) {
  const tgt = e.target;

  // Klik na select nesmie triggerovať item.onclick (bubble stop)
  if (tgt.closest && tgt.closest('[data-label-select]')) { e.stopPropagation(); return; }

  // Copy session ID
  const copy = tgt.closest && tgt.closest('.copy');
  if (copy && copy.dataset.sid) {
    e.stopPropagation();
    copyToClipboard(copy.dataset.sid);
    const orig = copy.textContent;
    copy.textContent = t('copied');
    setTimeout(function () { copy.textContent = orig; }, 1000);
    return;
  }

  // Delete button
  const del = tgt.closest && tgt.closest('[data-delete]');
  if (del) {
    e.stopPropagation();
    const item = del.closest('.item');
    if (!item) return;
    const site = item.dataset.site, id = item.dataset.id;
    if (!confirm(t('confirmDelete'))) return;
    deleteSession(site, id).then(function () {
      const wasActive = item.classList.contains('active');
      item.remove();
      summaryCache.delete(site + '/' + id);
      if (wasActive) {
        tearDown();
        mainEl.innerHTML = '<div class="empty">' + t('pickSession') + '</div>';
      }
      applyFilters();
    }).catch(function (err) { alert(t('deleteFailed') + err.message); });
    return;
  }
});

// Delegated change: label select
listEl.addEventListener('change', function (e) {
  const sel = e.target && e.target.closest && e.target.closest('[data-label-select]');
  if (!sel) return;
  const item = sel.closest('.item');
  if (!item) return;
  const site = item.dataset.site, id = item.dataset.id;
  const label = sel.value;
  sel.className = 'label-select' + (label ? ' ' + label : '');
  item.dataset.label = label;
  patchLabel(site, id, label).catch(function (err) {
    console.error('label patch failed', err);
    alert(t('labelUpdateFailed') + err.message);
  });
  applyFilters();
});

function showError(msg, detail) {
  mainEl.innerHTML = '<div class="empty" style="max-width:700px;text-align:left"><b>' + t('playbackError') + '</b><br>' + msg +
    (detail ? '<pre style="background:#fdd;padding:10px;overflow:auto;font-size:12px">' + String(detail).replace(/[<>]/g,'') + '</pre>' : '') + '</div>';
}

let resizeHandler = null;
function tearDown() {
  if (uiTimer) { clearInterval(uiTimer); uiTimer = null; }
  if (resizeHandler) { window.removeEventListener('resize', resizeHandler); resizeHandler = null; }
  if (replayer) { try { replayer.pause(); replayer.destroy && replayer.destroy(); } catch (e) {} replayer = null; }
}

async function play(site, id) {
  tearDown();
  mainEl.innerHTML = '<div class="empty">' + t('loading') + '</div>';

  let raw;
  try {
    raw = await fetch('/api/sessions/' + encodeURIComponent(site) + '/' + encodeURIComponent(id)).then(r => r.json());
  } catch (e) { showError(t('fetchFailed'), e.message); return; }

  const events = [];
  const typeCounts = {};
  for (let i = 0; i < raw.events.length; i++) {
    try {
      const ev = unpack(raw.events[i]);
      events.push(ev);
      typeCounts[ev.type] = (typeCounts[ev.type] || 0) + 1;
    } catch (e) { /* skip malformed */ }
  }

  if (events.length < 2) { showError(t('sessionTooShort', { n: events.length }), JSON.stringify(typeCounts)); return; }
  if (!typeCounts[2]) { showError(t('missingFullSnapshot'), JSON.stringify(typeCounts)); return; }

  // Zostav player kontajner + stage + controls
  mainEl.innerHTML = '';
  const player = document.createElement('div');
  player.className = 'player';

  const stage = document.createElement('div');
  stage.className = 'stage';
  player.appendChild(stage);

  const controls = document.createElement('div');
  controls.className = 'controls';
  controls.innerHTML =
    '<button id="pp">▶ ' + t('play') + '</button>' +
    '<span class="time" id="tm">00:00 / 00:00</span>' +
    '<div class="bar" id="bar"><div class="fill" id="fill"></div></div>' +
    '<label class="toggle" title="' + t('skipIdleTitle') + '"><input type="checkbox" id="skip" checked>' + t('skipIdle') + '</label>' +
    '<select id="speed" title="' + t('speedTitle') + '"><option value="0.5">0.5×</option><option value="1" selected>1×</option><option value="2">2×</option><option value="4">4×</option><option value="8">8×</option></select>';
  player.appendChild(controls);
  mainEl.appendChild(player);

  // Zisti viewport + origin z prvého Meta eventu (type 4)
  let vpW = 1280, vpH = 720, baseOrigin = '';
  for (const ev of events) {
    if (ev.type === 4 && ev.data) {
      if (ev.data.width) { vpW = ev.data.width; vpH = ev.data.height; }
      if (ev.data.href && !baseOrigin) {
        try { baseOrigin = new URL(ev.data.href).origin; } catch (e) {}
      }
      if (baseOrigin) break;
    }
  }
  // Root-relative URL rewrite — /modules/... → https://origin/modules/...
  // Bez toho iframe fetch-uje resources z rec.kocurik.sk (404) namiesto pôvodnej domény.
  if (baseOrigin) {
    const URL_ATTRS = ['src', 'href', 'data-src', 'poster', 'action'];
    function rewriteSrcset(v) {
      return v.split(',').map(part => {
        const t = part.trim();
        const sp = t.indexOf(' ');
        const url = sp === -1 ? t : t.slice(0, sp);
        const rest = sp === -1 ? '' : t.slice(sp);
        if (url.startsWith('/') && !url.startsWith('//')) return baseOrigin + url + rest;
        return t;
      }).join(', ');
    }
    function rewriteNode(n) {
      if (!n || typeof n !== 'object') return;
      const a = n.attributes;
      if (a) {
        for (const k of URL_ATTRS) {
          const v = a[k];
          if (typeof v === 'string' && v.startsWith('/') && !v.startsWith('//')) a[k] = baseOrigin + v;
        }
        if (typeof a.srcset === 'string') a.srcset = rewriteSrcset(a.srcset);
      }
      if (n.childNodes) for (const c of n.childNodes) rewriteNode(c);
    }
    for (const ev of events) {
      if (ev.type === 2 && ev.data && ev.data.node) rewriteNode(ev.data.node);
      // Incremental mutations tiež nesú nové nodes s URL atribútmi
      if (ev.type === 3 && ev.data && ev.data.source === 0 && Array.isArray(ev.data.adds)) {
        for (const add of ev.data.adds) if (add.node) rewriteNode(add.node);
      }
    }
  }

  try {
    replayer = new Replayer(events, {
      root: stage,
      skipInactive: true,
      showWarning: false,
      showDebug: false
    });
  } catch (e) {
    showError(t('replayerCrash'), e.stack || e.message);
    return;
  }

  // Fit-scale player do dostupnej plochy .main (bez upscale).
  // Available = clientWidth/Height mainu - padding - výška controls (~48).
  function applyFit() {
    const availW = mainEl.clientWidth - 32;      // .main padding 16 na kazdej strane
    const availH = mainEl.clientHeight - 32 - 48; // + ~48px na controls
    const scale = Math.min(1, availW / vpW, availH / vpH);
    const scaledW = Math.round(vpW * scale);
    const scaledH = Math.round(vpH * scale);
    player.style.width = scaledW + 'px';
    stage.style.width = scaledW + 'px';
    stage.style.height = scaledH + 'px';
    const wrapper = stage.querySelector('.replayer-wrapper');
    if (wrapper) {
      wrapper.style.setProperty('position', 'absolute', 'important');
      wrapper.style.setProperty('top', '0', 'important');
      wrapper.style.setProperty('left', '0', 'important');
      wrapper.style.setProperty('transform-origin', 'top left', 'important');
      wrapper.style.setProperty('transform', 'scale(' + scale + ')', 'important');
    }
    return { scale, scaledW, scaledH, availW, availH };
  }
  applyFit();

  // Debounced resize — prepočíta fit pri zmene okna
  let resizeTimer = null;
  resizeHandler = function () {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(function () { if (replayer) applyFit(); }, 150);
  };
  window.addEventListener('resize', resizeHandler);

  // Meta + UI wiring
  const meta = replayer.getMetaData();
  const totalMs = meta.totalTime;

  const ppBtn = controls.querySelector('#pp');
  const tmEl = controls.querySelector('#tm');
  const barEl = controls.querySelector('#bar');
  const fillEl = controls.querySelector('#fill');
  const speedEl = controls.querySelector('#speed');
  const skipEl = controls.querySelector('#skip');

  // Timeline markery — vygeneruj z eventov, umiestni na scrubber
  const startMs = meta.startTime;
  const markers = [];
  for (const ev of events) {
    if (!ev.timestamp || totalMs <= 0) continue;
    const rel = (ev.timestamp - startMs) / totalMs;
    if (rel < 0 || rel > 1) continue;
    if (ev.type === 4) {
      markers.push({ rel, ms: ev.timestamp - startMs, kind: 'nav', label: t('markerNav') + (ev.data && ev.data.href ? shortUrl(ev.data.href, 40) : '?') });
    } else if (ev.type === 3 && ev.data) {
      if (ev.data.source === 2) markers.push({ rel, ms: ev.timestamp - startMs, kind: 'click', label: t('markerClick') });
      else if (ev.data.source === 5) markers.push({ rel, ms: ev.timestamp - startMs, kind: 'input', label: t('markerInput') });
    }
  }
  for (const m of markers) {
    const el = document.createElement('div');
    el.className = 'marker ' + m.kind;
    el.style.left = (m.rel * 100) + '%';
    el.title = m.label + ' @ ' + fmtTime(m.ms);
    el.dataset.ms = String(m.ms);
    barEl.appendChild(el);
  }

  let playing = false;
  let currentMs = 0;

  function updateUi() {
    tmEl.textContent = fmtTime(currentMs) + ' / ' + fmtTime(totalMs);
    fillEl.style.width = (Math.min(1, currentMs / totalMs) * 100) + '%';
  }
  updateUi();

  function startTick() {
    if (uiTimer) clearInterval(uiTimer);
    uiTimer = setInterval(function () {
      if (!replayer || !playing) return;
      currentMs = replayer.getCurrentTime();
      updateUi();
      if (currentMs >= totalMs) { playing = false; ppBtn.textContent = '▶ ' + t('play'); }
    }, 100);
  }

  ppBtn.onclick = function () {
    if (!replayer) return;
    if (playing) {
      replayer.pause();
      playing = false;
      ppBtn.textContent = '▶ ' + t('play');
    } else {
      // ak sme na konci, reštartuj od 0
      if (currentMs >= totalMs - 100) { currentMs = 0; }
      replayer.play(currentMs);
      playing = true;
      ppBtn.textContent = '⏸ ' + t('pause');
      startTick();
    }
  };

  function seekTo(ms) {
    currentMs = Math.max(0, Math.min(totalMs, ms));
    if (playing) replayer.play(currentMs); else replayer.pause(currentMs);
    updateUi();
  }

  barEl.onclick = function (e) {
    // Marker klik: preskoč na jeho čas namiesto proporcionálneho seeku
    const marker = e.target && e.target.closest && e.target.closest('.marker');
    if (marker && marker.dataset.ms) { seekTo(parseInt(marker.dataset.ms, 10)); return; }
    const rect = barEl.getBoundingClientRect();
    const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    seekTo(pct * totalMs);
  };

  speedEl.onchange = function () {
    if (replayer) replayer.setConfig({ speed: parseFloat(speedEl.value) });
  };

  skipEl.onchange = function () {
    if (replayer) replayer.setConfig({ skipInactive: skipEl.checked });
  };
}

loadList();
</script>
</body>
</html>
